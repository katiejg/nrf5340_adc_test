# ── ADC ───────────────────────────────────────────────────────────────────────
CONFIG_ADC=y
CONFIG_ADC_ASYNC=y
CONFIG_GPIO=y

# POWER MANAGEMENT
# CONFIG_PM=y # no longer used by Nordic
CONFIG_PM_DEVICE=y
CONFIG_PM_DEVICE_RUNTIME=y

# ── Logging (RTT, same as peripheral_uart reference) ──────────────────────────
CONFIG_LOG=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_BACKEND_UART=n
CONFIG_LOG_PRINTK=n
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# ── BLE ───────────────────────────────────────────────────────────────────────
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="Device_ADC"
CONFIG_BT_MAX_CONN=1

# ── NUS service ───────────────────────────────────────────────────────────────
CONFIG_BT_NUS=y

# nRF5340: use host PRNG, not HCI for entropy (required on this SoC)
CONFIG_BT_HOST_CRYPTO_PRNG=y
CONFIG_ENTROPY_BT_HCI=n

# Increase ATT MTU so batch packets (37 bytes payload) fit in one notify.
# ATT header = 3 bytes → need MTU >= 40; set 65 for headroom.
CONFIG_BT_L2CAP_TX_MTU=65
CONFIG_BT_BUF_ACL_TX_SIZE=69
CONFIG_BT_BUF_ACL_RX_SIZE=69

# ── DK LEDs (connection status on LED2) ───────────────────────────────────────
CONFIG_DK_LIBRARY=y

# ── System ────────────────────────────────────────────────────────────────────
CONFIG_HEAP_MEM_POOL_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_ASSERT=y
